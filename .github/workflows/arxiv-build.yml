name: Build arXiv preprint

on:
  push:
    paths:
      - 'arxiv/**'
      - '.github/workflows/arxiv-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make \
            latexmk \
            lmodern \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-bibtex-extra

      - name: Build preprint
        working-directory: arxiv
        run: make

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: sotalens-arxiv-preprint
          path: arxiv/main.pdf
